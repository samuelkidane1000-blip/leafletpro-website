<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | LeafletPro UK</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#07122f 0%, #0c1b45 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:28px;
      padding:28px;
      box-shadow:0 20px 50px rgba(0,0,0,0.25);
    }

    h1{
      margin:0 0 10px;
      font-size:36px;
      color:#111827;
    }

    p{
      margin:0 0 22px;
      color:#6b7280;
      line-height:1.6;
    }

    label{
      display:block;
      margin-bottom:14px;
      font-weight:700;
      color:#344054;
    }

    input{
      width:100%;
      margin-top:8px;
      padding:16px;
      border-radius:16px;
      border:1px solid #dbe0ea;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      border:none;
      border-radius:18px;
      padding:18px;
      background:#d7a645;
      color:#111;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      margin-top:8px;
    }

    .msg{
      margin-top:16px;
      font-weight:700;
      color:#b42318;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin login</h1>
    <p>Sign in to access the LeafletPro UK admin dashboard.</p>

    <label>
      Email
      <input id="adminEmail" type="email" placeholder="admin@leafletprouk.com">
    </label>

    <label>
      Password
      <input id="adminPassword" type="password" placeholder="Enter password">
    </label>

    <button type="button" onclick="loginAdmin()">Log In</button>

    <div id="loginMessage" class="msg"></div>
  </div>

  <script>
    const ADMIN_EMAIL = "info@leafletprouk.com";
    const ADMIN_PASSWORD = "LeafletPro123";

    function loginAdmin(){
      const email = document.getElementById("adminEmail").value.trim().toLowerCase();
      const password = document.getElementById("adminPassword").value.trim();
      const msg = document.getElementById("loginMessage");

      if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD){
        localStorage.setItem("leafletpro_admin_logged_in", "true");
        window.location.href = "/admin-dashboard.html";
      } else {
        msg.textContent = "Wrong email or password.";
      }
    }
  </script>
</body>
</html>
