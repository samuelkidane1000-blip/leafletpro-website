<script>
  document.addEventListener("DOMContentLoaded", function () {
    const menuToggle = document.getElementById("menuToggle");
    const siteNav = document.getElementById("siteNav");
    const templateCards = document.querySelectorAll(".template-card");
    const imageModal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");
    const modalClose = document.getElementById("modalClose");
    const form = document.getElementById("designPrintingForm");
    const formStatus = document.getElementById("formStatus");

    if (menuToggle && siteNav) {
      menuToggle.addEventListener("click", function () {
        siteNav.classList.toggle("open");
      });
    }

    function openPreview(src, alt) {
      modalImage.src = src;
      modalImage.alt = alt || "Template preview";
      imageModal.classList.add("open");
    }

    function closePreview() {
      imageModal.classList.remove("open");
      modalImage.src = "";
    }

    if (modalClose) {
      modalClose.addEventListener("click", closePreview);
    }

    if (imageModal) {
      imageModal.addEventListener("click", function (e) {
        if (e.target === imageModal) closePreview();
      });
    }

    templateCards.forEach(function (card) {
      const templateName = card.getAttribute("data-template") || "";
      const imageSrc = card.getAttribute("data-image") || "";
      const img = card.querySelector("img");
      const zoomBtn = card.querySelector(".zoom-btn");
      const previewBtn = card.querySelector(".preview-btn");
      const useBtn = card.querySelector(".template-btn");

      if (img) {
        img.addEventListener("click", function () {
          openPreview(imageSrc, templateName);
        });
      }

      if (zoomBtn) {
        zoomBtn.addEventListener("click", function () {
          openPreview(imageSrc, templateName);
        });
      }

      if (previewBtn) {
        previewBtn.addEventListener("click", function () {
          openPreview(imageSrc, templateName);
        });
      }

      if (useBtn) {
        useBtn.addEventListener("click", function () {
          window.location.href = "/leaflet-design.html?template=" + encodeURIComponent(templateName);
        });
      }
    });

    if (form) {
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        const formData = new FormData(form);

        try {
          const response = await fetch("https://formspree.io/f/xojkkejz", {
            method: "POST",
            body: formData,
            headers: { Accept: "application/json" }
          });

          if (response.ok) {
            window.location.href = "/thank-you.html";
          } else {
            formStatus.textContent = "There was a problem sending your enquiry. Please try again.";
          }
        } catch (error) {
          formStatus.textContent = "There was a problem sending your enquiry. Please try again.";
        }
      });
    }
  });
</script>
