<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeafletPro Admin</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07122f;
      color: white;
      padding: 22px;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 8px;
    }

    p {
      color: rgba(255,255,255,0.75);
      font-size: 18px;
      margin: 0 0 24px;
    }

    .top-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-weight: 800;
      cursor: pointer;
      font-size: 15px;
    }

    .refresh {
      background: #d7a645;
      color: #111;
    }

    .logout {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 18px;
      border: none;
      margin-bottom: 24px;
      font-size: 16px;
    }

    .order {
      background: white;
      color: #111;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.25);
    }

    .order h2 {
      margin: 0 0 12px;
      font-size: 22px;
      color: #07122f;
    }

    .order-row {
      margin: 8px 0;
      line-height: 1.5;
      font-size: 15px;
    }

    .order-row strong {
      color: #07122f;
    }

    .message-box {
      background: #f4f6fb;
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .date {
      color: #777;
      font-size: 13px;
      margin-top: 12px;
    }

    .empty {
      background: white;
      color: #111;
      padding: 20px;
      border-radius: 18px;
      text-align: center;
    }

    @media (max-width: 600px) {
      body {
        padding: 18px;
      }

      h1 {
        font-size: 34px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <h1>LeafletPro Enquiries</h1>
  <p>Simple admin view for website quote requests.</p>

  <div class="top-buttons">
    <button class="refresh" onclick="loadOrders()">Refresh</button>
    <button class="logout" onclick="logoutAdmin()">Logout</button>
  </div>

  <input
    id="searchInput"
    type="text"
    placeholder="Search name, email, phone, postcode, company..."
  />

  <div id="ordersContainer"></div>

  <script>
    if (localStorage.getItem("leafletpro_admin_logged_in") !== "true") {
      window.location.href = "/login.html";
    }

    const BACKEND_URL = "https://leafletpro-backend.onrender.com";
    let allOrders = [];

    function safe(value) {
      return String(value || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (isNaN(date)) return value;
      return date.toLocaleString("en-GB");
    }

    function renderOrders() {
      const container = document.getElementById("ordersContainer");
      const search = document.getElementById("searchInput").value.toLowerCase();

      const filtered = allOrders.filter(order => {
        const text = [
          order.firstName,
          order.lastName,
          order.email,
          order.phone,
          order.company,
          order.postcode,
          order.quantity,
          order.printedAlready,
          order.campaignStartDate,
          order.areasRequired,
          order.notes
        ].join(" ").toLowerCase();

        return text.includes(search);
      });

      container.innerHTML = "";

      if (!filtered.length) {
        container.innerHTML = `<div class="empty">No enquiries found.</div>`;
        return;
      }

      filtered.forEach(order => {
        const card = document.createElement("div");
        card.className = "order";

        card.innerHTML = `
          <h2>${safe(order.firstName)} ${safe(order.lastName)}</h2>

          <div class="order-row"><strong>Email:</strong> ${safe(order.email)}</div>
          <div class="order-row"><strong>Phone:</strong> ${safe(order.phone)}</div>
          <div class="order-row"><strong>Company:</strong> ${safe(order.company)}</div>
          <div class="order-row"><strong>Postcode:</strong> ${safe(order.postcode)}</div>
          <div class="order-row"><strong>Quantity:</strong> ${safe(order.quantity)}</div>
          <div class="order-row"><strong>Printed Already:</strong> ${safe(order.printedAlready)}</div>
          <div class="order-row"><strong>Campaign Start Date:</strong> ${safe(order.campaignStartDate)}</div>
          <div class="order-row"><strong>Areas Required:</strong> ${safe(order.areasRequired)}</div>

          <div class="order-row"><strong>Message:</strong></div>
          <div class="message-box">${safe(order.notes || order.message || "No message")}</div>

          <div class="date">${safe(formatDate(order.createdAt))}</div>
        `;

        container.appendChild(card);
      });
    }

    async function loadOrders() {
      try {
        const response = await fetch(`${BACKEND_URL}/orders`);
        const orders = await response.json();

        allOrders = Array.isArray(orders) ? orders.slice().reverse() : [];
        renderOrders();

      } catch (error) {
        document.getElementById("ordersContainer").innerHTML =
          `<div class="empty">Unable to load enquiries.</div>`;
        console.error(error);
      }
    }

    function logoutAdmin() {
      localStorage.removeItem("leafletpro_admin_logged_in");
      window.location.href = "/login.html";
    }

    document.getElementById("searchInput").addEventListener("input", renderOrders);

    loadOrders();
  </script>

</body>
</html>
