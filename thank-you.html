<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | LeafletPro UK</title>
  <meta name="description" content="Thank you for contacting LeafletPro UK. Your enquiry has been sent successfully." />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <style>
    :root{
      --bg:#07122f;
      --bg-2:#0c1b45;
      --white:#ffffff;
      --text:#111827;
      --muted:#667085;
      --gold:#d7a645;
      --line:#e7eaf1;
      --shadow:0 24px 60px rgba(0,0,0,0.22);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
      color:var(--white);
    }

    .wrap{
      width:100%;
      max-width:620px;
    }

    .card{
      background:#ffffff;
      color:var(--text);
      border-radius:28px;
      padding:40px 36px;
      box-shadow:var(--shadow);
      text-align:center;
      border:1px solid rgba(231,234,241,0.9);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:72px;
      height:72px;
      margin:0 auto 20px;
      border-radius:999px;
      background:rgba(215,166,69,0.14);
      color:#9b6f16;
      font-size:34px;
      font-weight:800;
    }

    h1{
      margin:0 0 12px;
      font-size:42px;
      line-height:1.05;
      letter-spacing:-0.03em;
      color:#111827;
    }

    p{
      margin:0 auto 24px;
      max-width:460px;
      color:var(--muted);
      font-size:18px;
      line-height:1.7;
    }

    .sub{
      margin:0 auto 28px;
      max-width:500px;
      color:#475467;
      font-size:15px;
      line-height:1.7;
    }

    .actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 22px;
      border-radius:14px;
      text-decoration:none;
      font-weight:800;
      font-size:15px;
      transition:transform .18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-gold{
      background:var(--gold);
      color:#111827;
    }

    .btn-light{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }

    .footer-note{
      margin-top:18px;
      text-align:center;
      color:rgba(255,255,255,0.78);
      font-size:14px;
      line-height:1.6;
    }

    @media (max-width: 640px){
      body{
        padding:16px;
      }

      .card{
        padding:28px 20px;
        border-radius:22px;
      }

      .badge{
        width:62px;
        height:62px;
        font-size:28px;
        margin-bottom:18px;
      }

      h1{
        font-size:32px;
      }

      p{
        font-size:16px;
      }

      .sub{
        font-size:14px;
      }

      .actions{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">✓</div>
      <h1>Thank you</h1>
      <p>Your enquiry has been sent successfully.</p>
      <div class="sub">
        We’ve received your details and a member of the LeafletPro UK team will get back to you shortly to discuss your campaign.
      </div>

      <div class="actions">
        <a href="https://leafletprouk.com" class="btn btn-gold">Back to Homepage</a>
        <a href="mailto:info@leafletprouk.com" class="btn btn-light">Email Us</a>
      </div>
    </div>

    <div class="footer-note">
      LeafletPro UK • Premium tracked leaflet campaigns across London
    </div>
  </div>
</body>
</html>
