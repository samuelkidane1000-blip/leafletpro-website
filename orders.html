<script>
  const BACKEND_URL = "https://leafletpro-backend.onrender.com";

  function formatMoney(value) {
    return "£" + Number(value || 0).toFixed(2);
  }

  function formatTime() {
    const now = new Date();
    return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  async function fetchOrders() {
    const endpoints = [
      `${BACKEND_URL}/orders`,
      `${BACKEND_URL}/api/orders`
    ];

    for (const url of endpoints) {
      try {
        const response = await fetch(url);
        const data = await response.json();

        if (Array.isArray(data)) return data;
        if (Array.isArray(data.orders)) return data.orders;
        if (Array.isArray(data.data)) return data.data;
      } catch (error) {
        console.error("Fetch failed for:", url, error);
      }
    }

    return [];
  }

  async function loadOrders() {
    const tableBody = document.querySelector("#ordersTable tbody");
    const activityList = document.getElementById("activityList");
    tableBody.innerHTML = "";
    activityList.innerHTML = "";

    try {
      const orders = await fetchOrders();

      document.getElementById("lastUpdated").textContent = formatTime();

      if (!Array.isArray(orders) || orders.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="6" class="empty">No orders yet</td></tr>`;
        activityList.innerHTML = `<div class="activity-item"><div><strong>No activity yet</strong><span>New orders will appear here once saved from the website.</span></div></div>`;
        document.getElementById("totalOrders").textContent = "0";
        document.getElementById("totalRevenue").textContent = "£0.00";
        document.getElementById("averageOrder").textContent = "£0.00";
        document.getElementById("sharedCount").textContent = "0";
        document.getElementById("solusCount").textContent = "0";
        document.getElementById("largestOrder").textContent = "0";
        document.getElementById("topPostcode").textContent = "-";
        return;
      }

      let totalRevenue = 0;
      let sharedCount = 0;
      let solusCount = 0;
      let largestOrder = 0;
      const postcodeCounts = {};

      orders.forEach((order, index) => {
        const total =
          Number(order.totalCost) ||
          Number(order.total) ||
          Number(order.subtotalCost) ||
          0;

        const quantity = Number(order.quantity) || 0;
        const deliveryType = (order.deliveryType || "").toLowerCase();

        totalRevenue += total;
        if (deliveryType === "shared") sharedCount++;
        if (deliveryType === "solus") solusCount++;
        if (quantity > largestOrder) largestOrder = quantity;

        if (order.postcode) {
          postcodeCounts[order.postcode] = (postcodeCounts[order.postcode] || 0) + 1;
        }

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${order.postcode || ""}</td>
          <td>${quantity || ""}</td>
          <td>${formatMoney(total)}</td>
          <td><span class="tag ${deliveryType}">${order.deliveryType || ""}</span></td>
          <td>${order.email || ""}</td>
          <td>${order.phone || ""}</td>
        `;
        tableBody.appendChild(row);

        if (index < 5) {
          const item = document.createElement("div");
          item.className = "activity-item";
          item.innerHTML = `
            <div>
              <strong>${order.postcode || "No postcode"} · ${quantity || 0} leaflets</strong>
              <span>${formatMoney(total)} · ${order.deliveryType || "unknown delivery"} · ${order.email || "no email"}</span>
            </div>
            <span class="tag ${deliveryType}">${order.deliveryType || "order"}</span>
          `;
          activityList.appendChild(item);
        }
      });

      const topPostcodeEntry = Object.entries(postcodeCounts).sort((a, b) => b[1] - a[1])[0];

      document.getElementById("totalOrders").textContent = orders.length;
      document.getElementById("totalRevenue").textContent = formatMoney(totalRevenue);
      document.getElementById("averageOrder").textContent = formatMoney(totalRevenue / orders.length);
      document.getElementById("sharedCount").textContent = sharedCount;
      document.getElementById("solusCount").textContent = solusCount;
      document.getElementById("largestOrder").textContent = largestOrder.toLocaleString();
      document.getElementById("topPostcode").textContent = topPostcodeEntry ? topPostcodeEntry[0] : "-";
    } catch (error) {
      tableBody.innerHTML = `<tr><td colspan="6" class="empty">Unable to load orders</td></tr>`;
      activityList.innerHTML = `<div class="activity-item"><div><strong>Dashboard error</strong><span>Unable to load backend order data right now.</span></div></div>`;
      console.error("Dashboard load error:", error);
    }
  }

  async function exportCSV() {
    try {
      const orders = await fetchOrders();

      if (!Array.isArray(orders) || orders.length === 0) {
        alert("No orders to export yet.");
        return;
      }

      let csv = "Postcode,Quantity,Total,Delivery,Email,Phone\n";

      orders.forEach(order => {
        const total =
          Number(order.totalCost) ||
          Number(order.total) ||
          Number(order.subtotalCost) ||
          0;

        csv +=
          `"${order.postcode || ""}",` +
          `"${order.quantity || ""}",` +
          `"${total.toFixed(2)}",` +
          `"${order.deliveryType || ""}",` +
          `"${order.email || ""}",` +
          `"${order.phone || ""}"\n`;
      });

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = window.URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "leafletpro_orders.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    } catch (error) {
      alert("CSV export failed.");
      console.error("CSV export error:", error);
    }
  }

  loadOrders();
</script>
