<script>
async function loadOrders() {
  const table = document.querySelector("#ordersTable tbody");

  try {
    const res = await fetch("https://leafletpro-backend.onrender.com/orders");
    const orders = await res.json();

    if (!orders || orders.length === 0) {
      const row = document.createElement("tr");
      row.innerHTML = `<td colspan="5">No orders yet</td>`;
      table.appendChild(row);
      return;
    }

    orders.forEach(order => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${order.postcode || ""}</td>
        <td>${order.quantity || ""}</td>
        <td>£${order.totalCost || ""}</td>
        <td>${order.deliveryType || ""}</td>
        <td>${order.date || new Date().toLocaleDateString()}</td>
      `;
      table.appendChild(row);
    });
  } catch (error) {
    const row = document.createElement("tr");
    row.innerHTML = `<td colspan="5">Unable to load orders</td>`;
    table.appendChild(row);
  }
}

loadOrders();
</script>
