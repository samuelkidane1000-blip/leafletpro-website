<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeafletPro Admin Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #07153d 0%, #081033 100%);
      color: white;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    h1 {
      font-size: 56px;
      line-height: 1;
      margin: 0 0 20px;
    }

    .subtext {
      font-size: 18px;
      color: #b9bfd3;
      margin-bottom: 36px;
      max-width: 700px;
    }

    .topbar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .btn {
      border: none;
      border-radius: 20px;
      padding: 18px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #25345f;
      color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-bottom: 32px;
    }

    .card {
      background: #f4f4f4;
      color: #1c2541;
      border-radius: 30px;
      padding: 34px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    .card h3 {
      margin: 0 0 18px;
      color: #7b8194;
      font-size: 20px;
    }

    .card strong {
      font-size: 34px;
    }

    .table-card {
      background: #f4f4f4;
      color: #1c2541;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 22px 24px;
      text-align: left;
      border-bottom: 1px solid #dfe3ea;
      font-size: 18px;
    }

    th {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .empty {
      text-align: center;
      color: #7b8194;
      padding: 40px 24px;
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 42px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      th, td {
        padding: 16px 14px;
        font-size: 15px;
      }

      .card strong {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>LeafletPro Admin Dashboard</h1>
    <p class="subtext">Track saved quote requests and campaign orders.</p>

    <div class="topbar">
      <button class="btn" onclick="loadOrders()">Refresh</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>

    <div class="stats">
      <div class="card">
        <h3>Total Orders</h3>
        <strong id="totalOrders">0</strong>
      </div>
      <div class="card">
        <h3>Total Revenue</h3>
        <strong id="totalRevenue">£0.00</strong>
      </div>
      <div class="card">
        <h3>Average Order</h3>
        <strong id="averageOrder">£0.00</strong>
      </div>
    </div>

    <div class="table-card">
      <table id="ordersTable">
        <thead>
          <tr>
            <th>POSTCODE</th>
            <th>QUANTITY</th>
            <th>TOTAL (£)</th>
            <th>DELIVERY</th>
            <th>EMAIL</th>
            <th>PHONE</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://leafletpro-backend.onrender.com";

    async function loadOrders() {
      const tableBody = document.querySelector("#ordersTable tbody");
      tableBody.innerHTML = "";

      try {
        const response = await fetch(`${BACKEND_URL}/orders`);
        const orders = await response.json();

        if (!Array.isArray(orders) || orders.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="6" class="empty">No orders yet</td></tr>`;
          document.getElementById("totalOrders").textContent = "0";
          document.getElementById("totalRevenue").textContent = "£0.00";
          document.getElementById("averageOrder").textContent = "£0.00";
          return;
        }

        let totalRevenue = 0;

        orders.forEach(order => {
          const total =
            Number(order.totalCost) ||
            Number(order.total) ||
            Number(order.subtotalCost) ||
            0;

          totalRevenue += total;

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${order.postcode || ""}</td>
            <td>${order.quantity || ""}</td>
            <td>£${total.toFixed(2)}</td>
            <td>${order.deliveryType || ""}</td>
            <td>${order.email || ""}</td>
            <td>${order.phone || ""}</td>
          `;
          tableBody.appendChild(row);
        });

        document.getElementById("totalOrders").textContent = orders.length;
        document.getElementById("totalRevenue").textContent = `£${totalRevenue.toFixed(2)}`;
        document.getElementById("averageOrder").textContent =
          `£${(totalRevenue / orders.length).toFixed(2)}`;
      } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="6" class="empty">Unable to load orders</td></tr>`;
        console.error("Dashboard load error:", error);
      }
    }

    async function exportCSV() {
      try {
        const response = await fetch(`${BACKEND_URL}/orders`);
        const orders = await response.json();

        if (!Array.isArray(orders) || orders.length === 0) {
          alert("No orders to export yet.");
          return;
        }

        let csv = "Postcode,Quantity,Total,Delivery,Email,Phone\n";

        orders.forEach(order => {
          const total =
            Number(order.totalCost) ||
            Number(order.total) ||
            Number(order.subtotalCost) ||
            0;

          csv +=
            `"${order.postcode || ""}",` +
            `"${order.quantity || ""}",` +
            `"${total.toFixed(2)}",` +
            `"${order.deliveryType || ""}",` +
            `"${order.email || ""}",` +
            `"${order.phone || ""}"\n`;
        });

        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = window.URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "leafletpro_orders.csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch (error) {
        alert("CSV export failed.");
        console.error("CSV export error:", error);
      }
    }

    loadOrders();
  </script>
</body>
</html>
